<main class="gate">
  <video class="gate-thunder" autoplay loop [muted]="true" playsinline aria-hidden="true">
    <source src="assets/videos/trueno.mp4" type="video/mp4" />
  </video>
  <img class="brand-logo" src="assets/images/app/logo.png" alt="CP Ensalada" />
  <section class="panel">
    <img class="panel-lock" src="assets/images/app/candado.png" alt="" aria-hidden="true" />
    <p class="eyebrow">CP Ensalada</p>
    <h1>Panel de aportes</h1>
    <form (ngSubmit)="submit()">
      <div class="password-field">
        <input
          name="password"
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          placeholder="Contrasena de la CP"
          autocomplete="current-password"
        />
        <button
          class="toggle-password"
          type="button"
          [attr.aria-label]="showPassword ? 'Ocultar contrasena' : 'Ver contrasena'"
          (click)="togglePasswordVisibility()"
        >
          <i class="fa-solid" [class.fa-eye]="!showPassword" [class.fa-eye-slash]="showPassword"></i>
        </button>
      </div>
      @if (error) {
        <p class="error" [class.error--warning]="errorVariant === 'warning'" role="alert">
          <i class="fa-solid fa-triangle-exclamation"></i>
          <span>{{ error }}</span>
        </p>
      }
      <button class="submit-button" type="submit" [disabled]="isSubmitting">
        @if (isSubmitting) {
          <i class="fa-solid fa-spinner fa-spin"></i>
          Validando...
        } @else {
          Entrar
        }
      </button>
    </form>
  </section>
</main>
